<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLORP</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --light: #1a1a1a;
            --hover: #252525;
            --text: #e6e6e6;
            --warning: #ff4444;
            --overlay: rgba(21, 21, 21, 0.95);
            --radius: 10px;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; user-select: none; -webkit-drag-none: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Segoe UI', sans-serif; color: var(--text);
            overflow: hidden;
        }

        #app-container {
            width: 100vw; height: 100vh; background-color: var(--bg);
            display: flex; position: relative;
        }

        /* LEFT MAIN PANEL */
        #main-panel {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; transition: all 0.6s var(--ease);
            z-index: 10;
        }

        #logo {
            width: 80%; max-width: 500px; height: auto;
            transition: all 0.6s var(--ease);
            pointer-events: none; margin-bottom: 40px;
        }

        /* BUTTONS & CONTROLS */
        #central-action {
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.6s var(--ease);
        }

        #btn-select {
            width: 240px; height: 52px; background: var(--light);
            color: white; border: none; border-radius: var(--radius);
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        #btn-select:hover { background: var(--hover); }

        #extra-controls {
            margin-top: 20px; display: none; flex-direction: column;
            align-items: center; gap: 15px; opacity: 0; transition: opacity 0.5s;
        }

        .btn-anim {
            width: 220px; height: 42px; background: var(--light);
            color: white; border: none; border-radius: var(--radius);
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-anim:hover { background: var(--hover); }
        #btn-convert { background: var(--light); border: 1px solid #333; }

        /* MODES */
        #mode-container { display: flex; gap: 15px; align-items: center; }
        .radio-label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
        .radio-label input { appearance: none; width: 14px; height: 14px; border-radius: 7px; border: 2px solid #555; margin: 0; cursor: pointer; }
        .radio-label input:checked { background-color: #e6e6e6; border: 2px solid #2a2a2a; }

        #status {
            margin-top: 30px; color: #aaa; font-size: 11px;
            text-align: center; height: 20px; min-width: 200px;
        }

        #proc-indicator {
            position: absolute; left: 20px; top: 20px; width: 32px; height: 32px;
            opacity: 0; transition: opacity 0.3s;
        }

        /* RIGHT QUEUE PANEL */
        #right-panel {
            width: 0; background: var(--bg); border-left: 0px solid #1a1a1a;
            transition: all 0.6s var(--ease); display: flex; flex-direction: column;
            overflow: hidden;
        }

        #queue-header {
            padding: 20px; font-size: 12px; display: flex;
            justify-content: space-between; align-items: center; white-space: nowrap;
        }
        #queue-list { flex: 1; overflow-y: auto; padding: 0 15px; }
        #queue-list::-webkit-scrollbar { width: 4px; }
        #queue-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .q-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 5px; font-size: 12px; border-bottom: 1px solid #151515;
        }
        .q-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; cursor: pointer; }
        .q-remove { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; }
        .q-remove:hover { color: var(--warning); }

        /* STATES */
        body.has-files #main-panel { align-items: flex-start; padding-left: 10%; }
        body.has-files #logo { width: 200px; margin-bottom: 20px; }
        body.has-files #right-panel { width: 300px; border-left: 1px solid #1a1a1a; }
        body.has-files #extra-controls { display: flex; opacity: 1; }
        body.has-files #btn-select { width: 220px; height: 42px; }

        /* OVERLAYS */
        #drag-overlay {
            position: fixed; inset: 0; background: var(--overlay); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #drag-overlay img { max-width: 40%; height: auto; }

        #loading-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #lego-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1500;
            transform: translateY(100%); transition: 0.4s var(--ease);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #lego-overlay.show { transform: translateY(0); }

        #preview-tooltip {
            position: fixed; width: 180px; background: var(--bg); border: 1px solid #444;
            border-radius: var(--radius); padding: 5px; display: none; z-index: 3000; pointer-events: none;
        }
        #preview-img { width: 100%; border-radius: 5px; image-rendering: pixelated; }

        #lego-warn-label { color: var(--warning); font-size: 11px; margin-top: 10px; cursor: pointer; text-decoration: underline; display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="processing.gif" width="32">
        <div style="margin-top:15px; font-weight:bold; font-size:12px; letter-spacing:2px;" id="init-status">GLORP ENGINE STARTING...</div>
    </div>

    <div id="app-container">
        <img src="processing.gif" id="proc-indicator">
        
        <div id="main-panel">
            <img src="logo.png" id="logo">
            
            <div id="central-action">
                <button id="btn-select" onclick="document.getElementById('file-input').click()">Select Images</button>
                <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                
                <div id="extra-controls">
                    <button class="btn-anim" style="opacity:0.5; cursor:not-allowed;">Auto Download Mode</button>
                    <div id="mode-container">
                        <label class="radio-label"><input type="radio" name="mode" value="monolith" checked> Monolith</label>
                        <label class="radio-label"><input type="radio" name="mode" value="lego"> Lego</label>
                        <label class="radio-label"><input type="radio" name="mode" value="webp"> WebP</label>
                    </div>
                    <button id="btn-convert" class="btn-anim">Convert</button>
                    <div id="lego-warn-label">⚠️ Performance Warning</div>
                </div>

                <div id="status"></div>
            </div>
        </div>

        <div id="right-panel">
            <div id="queue-header">
                <span style="color:#555">FILE QUEUE <b id="queue-count">(0)</b></span>
                <span id="btn-clear" style="text-decoration:underline; cursor:pointer; color:#777; font-size:10px;">Clear All</span>
            </div>
            <div id="queue-list"></div>
        </div>
    </div>

    <div id="drag-overlay"><img src="DropUrStuffHere.png"></div>

    <div id="lego-overlay">
        <h2 style="color:var(--warning)">LEGO MODE PERFORMANCE WARNING</h2>
        <p style="color:#888; font-size:14px;">Large images may cause browser lag.</p>
        <img src="lego_warning.gif" style="max-width:80%; max-height:60%;">
        <p style="color:#444; margin-top:20px; cursor:pointer;" onclick="toggleLegoOverlay(false)">Click to close</p>
    </div>

    <div id="preview-tooltip"><img id="preview-img"></div>

    <script>
        const MESHING_CODE = `
import numpy as np
CLOCKWISE, ANTICLOCKWISE = 1, 2
def edge_finding(grid, color):
    mask = np.where(grid == color)
    pos_h = np.zeros((grid.shape[0] + 1, grid.shape[1]), dtype=np.uint8); pos_h[mask] = 1
    hor_edges = (pos_h - np.roll(1 - pos_h, 1, axis=0) == 0) * ANTICLOCKWISE - (pos_h + np.roll(1 - pos_h, 1, axis=0) == 2)
    pos_v = np.zeros((grid.shape[0], grid.shape[1] + 1), dtype=np.uint8); pos_v[mask] = 1
    ver_edges = (pos_v - np.roll(1 - pos_v, 1, axis=1) == 0) * CLOCKWISE + (pos_v + np.roll(1 - pos_v, 1, axis=1) == 2)
    return ver_edges, hor_edges
def explore_up(x, y, v, h):
    for dX in range(x, -1, -1):
        if v[dX, y] == ANTICLOCKWISE: v[dX, y] = 0
        else: break
    else: dX -= 1
    p = f"v{dX - x}"
    if h[dX + 1, y] == CLOCKWISE: return p + explore_right(dX + 1, y, v, h)
    elif y > 0 and h[dX + 1, y - 1] == ANTICLOCKWISE: return p + explore_left(dX + 1, y - 1, v, h)
    return p
def explore_left(x, y, v, h):
    for dY in range(y, -1, -1):
        if h[x, dY] == ANTICLOCKWISE: h[x, dY] = 0
        else: break
    else: dY -= 1
    p = f"h{dY - y}"
    if x > 0 and v[x - 1, dY + 1] == ANTICLOCKWISE: return p + explore_up(x - 1, dY + 1, v, h)
    elif dY < v.shape[1] and v[x, dY + 1] == CLOCKWISE: return p + explore_down(x, dY + 1, v, h)
    return p
def explore_down(x, y, v, h):
    for dX in range(x, v.shape[0]):
        if v[dX, y] == CLOCKWISE: v[dX, y] = 0
        else: break
    else: dX += 1
    p = f"v{dX - x}"
    if y > 0 and h[dX, y - 1] == ANTICLOCKWISE: return p + explore_left(dX, y - 1, v, h)
    elif dX < h.shape[0] and h[dX, y] == CLOCKWISE: return p + explore_right(dX, y, v, h)
    return p
def explore_right(x, y, v, h):
    for dY in range(y, h.shape[1]):
        if h[x, dY] == CLOCKWISE: h[x, dY] = 0
        else: break
    else: dY += 1
    p = f"h{dY - y}"
    if dY < v.shape[1] and v[x, dY] == CLOCKWISE: return p + explore_down(x, dY, v, h)
    elif x > 0 and v[x - 1, dY] == ANTICLOCKWISE: return p + explore_up(x - 1, dY, v, h)
    return p
def path_finding(grid, color):
    v, h = edge_finding(grid, color); path = ""
    while np.any(h == CLOCKWISE):
        x, y = np.argwhere(h == CLOCKWISE)[0]
        path += f"M{y},{x}" + explore_right(x, y, v, h) + "z"
    return path
`;

        let pyodide;
        let selectedFiles = [];
        let twInterval;

        async function init() {
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage("numpy");
                await pyodide.runPython(MESHING_CODE);
                document.getElementById('loading-screen').style.display = 'none';
            } catch(e) { document.getElementById('init-status').innerText = "ERROR LOADING ENGINE"; }
        }
        init();

        function setStatus(text) {
            clearInterval(twInterval);
            let i = 0; document.getElementById('status').innerText = "";
            twInterval = setInterval(() => {
                if(i < text.length) { document.getElementById('status').innerText += text[i++]; }
                else { clearInterval(twInterval); }
            }, 30);
        }

        function handleFiles(files) {
            Array.from(files).forEach(f => {
                if(!f.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => { selectedFiles.push({file: f, img}); renderQueue(); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(f);
            });
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            list.innerHTML = "";
            document.getElementById('queue-count').innerText = `(${selectedFiles.length})`;
            
            if(selectedFiles.length > 0) document.body.classList.add('has-files');
            else document.body.classList.remove('has-files');

            const mode = document.querySelector('input[name="mode"]:checked').value;
            document.getElementById('lego-warn-label').style.display = mode === 'lego' ? 'block' : 'none';

            selectedFiles.forEach((item, idx) => {
                const div = document.createElement('div'); div.className = 'q-item';
                div.innerHTML = `<span class="q-name">${item.file.name}</span><button class="q-remove" onclick="removeFile(${idx})">×</button>`;
                
                const name = div.querySelector('.q-name');
                name.onmouseenter = (e) => showTooltip(item.img.src, e);
                name.onmouseleave = hideTooltip;
                list.appendChild(div);
            });
        }

        function removeFile(i) { selectedFiles.splice(i, 1); renderQueue(); }
        function showTooltip(src, e) { 
            const t = document.getElementById('preview-tooltip');
            document.getElementById('preview-img').src = src;
            t.style.display = 'block'; t.style.left = (e.clientX - 200) + 'px'; t.style.top = e.clientY + 'px';
        }
        function hideTooltip() { document.getElementById('preview-tooltip').style.display = 'none'; }
        function toggleLegoOverlay(show) { document.getElementById('lego-overlay').classList.toggle('show', show); }

        document.getElementById('file-input').onchange = e => handleFiles(e.target.files);
        document.getElementById('btn-clear').onclick = () => { selectedFiles = []; renderQueue(); };
        document.getElementById('lego-warn-label').onclick = () => toggleLegoOverlay(true);

        window.ondragenter = () => document.getElementById('drag-overlay').style.opacity = "1";
        document.getElementById('drag-overlay').ondragleave = () => document.getElementById('drag-overlay').style.opacity = "0";
        document.getElementById('drag-overlay').ondragover = e => e.preventDefault();
        document.getElementById('drag-overlay').ondrop = e => {
            e.preventDefault(); document.getElementById('drag-overlay').style.opacity = "0";
            handleFiles(e.dataTransfer.files);
        };

        document.getElementById('btn-convert').onclick = async () => {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            document.getElementById('proc-indicator').style.opacity = "1";
            setStatus("Processing...");

            for(const item of selectedFiles) {
                const {file, img} = item;
                const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, img.width, img.height);
                
                let content, ext = ".svg";
                if(mode === 'monolith') {
                    pyodide.globals.set("raw", imageData.data); pyodide.globals.set("w", img.width); pyodide.globals.set("h", img.height);
                    content = await pyodide.runPythonAsync(`
pixels = np.frombuffer(raw.to_py(), dtype=np.uint8).reshape((h, w, 4))
colors = np.unique(pixels.reshape(-1, 4), axis=0); colors = colors[colors[:, 3] > 0]
grid = (pixels[:,:,0].astype(np.uint32) << 24) | (pixels[:,:,1].astype(np.uint32) << 16) | (pixels[:,:,2].astype(np.uint32) << 8) | pixels[:,:,3]
res = [f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {w} {h}" shape-rendering="crispEdges">', "<style>"]
for i, c in enumerate(colors): res.append(f'.c{i} {{ fill:#{c[0]:02x}{c[1]:02x}{c[2]:02x}; fill-opacity:{c[3]/255}; }}')
res.append("</style>")
for i, c in enumerate(colors):
    c_int = int((c[0]<<24)|(c[1]<<16)|(c[2]<<8)|c[3])
    p_data = path_finding(grid, c_int)
    if p_data: res.append(f'<path class="c{i}" d="{p_data}"/>')
res.append("</svg>")
"\\n".join(res)`);
                } else if(mode === 'lego') {
                    content = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${img.width} ${img.height}" shape-rendering="crispEdges">`;
                    const d = imageData.data;
                    for(let i=0; i<d.length; i+=4) if(d[i+3]>0) {
                        const x=(i/4)%img.width, y=Math.floor((i/4)/img.width);
                        content += `<rect x="${x}" y="${y}" width="1" height="1" fill="#${((1<<24)+(d[i]<<16)+(d[i+1]<<8)+d[i+2]).toString(16).slice(1)}" fill-opacity="${d[i+3]/255}"/>`;
                    }
                    content += `</svg>`;
                } else { content = canvas.toDataURL('image/webp'); ext = ".webp"; }

                const a = document.createElement('a'); a.href = ext === ".svg" ? URL.createObjectURL(new Blob([content], {type:'image/svg+xml'})) : content;
                a.download = file.name.split('.')[0] + ext; a.click();
            }
            document.getElementById('proc-indicator').style.opacity = "0";
            setStatus("All tasks finished.");
        };
    </script>
</body>
</html>
