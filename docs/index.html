<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLORP</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --light: #1a1a1a;
            --hover: #252525;
            --text: #e6e6e6;
            --warning: #ff4444;
            --overlay: rgba(21, 21, 21, 0.95);
            --radius: 10px;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; user-select: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text);
            overflow: hidden;
        }

        #app-container {
            width: 100vw; height: 100vh; display: flex; position: relative;
        }

        #main-panel {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; transition: all 0.6s var(--ease);
            z-index: 10; height: 100%; overflow: hidden;
        }

        #logo {
            height: 220px; max-width: 90%; object-fit: contain;
            transition: all 0.6s var(--ease); pointer-events: none; margin-bottom: 30px;
        }

        #central-action {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            transition: all 0.6s var(--ease); width: 100%; max-width: 300px;
        }

        #btn-select {
            width: 240px; height: 52px; background: var(--light);
            color: white; border: none; border-radius: var(--radius);
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        #btn-select:hover { background: var(--hover); }

        #extra-controls {
            display: flex; flex-direction: column; align-items: center;
            width: 260px; height: 0; opacity: 0; overflow: hidden;
            transition: all 0.6s var(--ease); pointer-events: none;
        }

        #mode-container {
            display: flex; gap: 15px; align-items: center; height: 30px; margin-top: 20px;
        }
        .radio-label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
        .radio-label input {
            appearance: none; width: 14px; height: 14px; border-radius: 7px;
            border: 2px solid #555; margin: 0; cursor: pointer; background: transparent;
        }
        .radio-label input:checked { background-color: #e6e6e6; border: 2px solid #2a2a2a; }

        #btn-convert {
            width: 200px; height: 42px; background: var(--light);
            color: white; border: none; border-radius: var(--radius);
            font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px;
        }
        #btn-convert:hover { background: var(--hover); }

        #lego-warn-label {
            color: var(--warning); font-size: 11px; text-decoration: underline;
            cursor: pointer; margin-top: 15px; display: none; text-align: center; width: 100%;
        }

        #stats-label {
            color: #666; font-size: 11px; text-decoration: underline;
            text-align: center; margin-top: 5px; width: 100%; height: 15px;
        }

        #status {
            color: #aaa; font-size: 11px; text-align: center; height: 30px;
            line-height: 30px; width: 240px; margin-top: 20px;
        }

        #proc-indicator {
            position: absolute; left: 12px; top: 8px; width: 32px; height: 32px;
            opacity: 0; transition: opacity 0.3s;
        }

        #right-panel {
            width: 0; height: 100%; background: var(--bg); border-left: 0px solid #1a1a1a;
            transition: all 0.6s var(--ease); display: flex; flex-direction: column;
            overflow: hidden; flex-shrink: 0;
        }

        #queue-header {
            padding: 20px; font-size: 12px; display: flex; justify-content: space-between;
            align-items: center; white-space: nowrap; height: 60px;
        }
        
        #btn-clear {
            background: transparent; border: none; color: #777; font-size: 10px;
            text-decoration: underline; cursor: pointer; padding: 0;
        }

        #queue-list { flex: 1; overflow-y: auto; padding: 0 15px; }
        #queue-list::-webkit-scrollbar { display: none; }

        .q-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 5px; font-size: 12px;
        }
        .q-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; cursor: pointer; }
        .q-remove { background: transparent; border: none; color: #777; font-size: 18px; font-weight: bold; cursor: pointer; }
        .q-remove:hover { color: var(--warning); }

        body.has-files #logo { height: 150px; margin-bottom: 20px; }
        body.has-files #right-panel { width: 220px; border-left: 1px solid #1a1a1a; }
        body.has-files #btn-select { width: 200px; height: 42px; padding: 10px; }
        body.has-files #extra-controls { height: 150px; opacity: 1; pointer-events: auto; }
        body.has-files #status { margin-top: 10px; }

        #drag-overlay {
            position: fixed; inset: 0; background-color: var(--overlay); z-index: 9999;
            display: none; justify-content: center; align-items: center; pointer-events: none;
        }
        #drag-overlay img { width: 50%; max-width: 500px; object-fit: contain; pointer-events: none; }

        #loading-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #lego-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1500;
            transform: translateY(100%); transition: 0.4s var(--ease);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #lego-overlay.show { transform: translateY(0); }

        #preview-tooltip {
            position: fixed; width: 180px; height: 190px; background: var(--bg); border: 1px solid #444;
            border-radius: var(--radius); padding: 4px; display: none; flex-direction: column;
            align-items: center; z-index: 3000; pointer-events: none;
        }
        #preview-img { width: 170px; height: 132px; object-fit: contain; background: var(--light); border-radius: 6px; }
        #preview-warn { color: var(--warning); font-size: 11px; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="processing.gif" width="32" height="32">
        <div style="margin-top:15px; font-weight:bold; font-size:12px; letter-spacing:2px; color:#777;" id="init-status">GLORP ENGINE STARTING...</div>
    </div>

    <div id="app-container">
        <img src="processing.gif" id="proc-indicator">
        
        <div id="main-panel">
            <img src="logo.png" id="logo">
            
            <div id="central-action">
                <button id="btn-select" onclick="document.getElementById('file-input').click()">Select Images</button>
                <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                
                <div id="extra-controls">
                    <div id="mode-container">
                        <label class="radio-label"><input type="radio" name="mode" value="monolith" checked> Monolith</label>
                        <label class="radio-label"><input type="radio" name="mode" value="lego"> Lego</label>
                        <label class="radio-label"><input type="radio" name="mode" value="webp"> WebP</label>
                    </div>
                    <button id="btn-convert">Convert</button>
                    <div id="lego-warn-label">⚠️ Performance Warning (Click for info)</div>
                    <div id="stats-label"></div>
                </div>

                <div id="status"></div>
            </div>
        </div>

        <div id="right-panel">
            <div id="queue-header">
                <div>FILE QUEUE <span id="queue-count" style="color:#555; font-weight:bold; margin-left:5px;">(0)</span></div>
                <button id="btn-clear">Clear All</button>
            </div>
            <div id="queue-list"></div>
        </div>
    </div>

    <div id="drag-overlay"><img src="DropUrStuffHere.png"></div>

    <div id="lego-overlay">
        <h2 style="color:var(--warning); margin-bottom: 5px;">LEGO MODE PERFORMANCE WARNING</h2>
        <p style="color:#888; font-size:13px; margin-bottom: 20px;">Software may lag or crash due to high object count.</p>
        <img src="lego_warning.gif" style="width:500px; height:350px; object-fit:contain;">
        <p style="color:#444; font-size:10px; margin-top:20px; text-decoration:underline; cursor:pointer;" onclick="toggleLegoOverlay(false)">Click anywhere to close</p>
    </div>

    <div id="preview-tooltip">
        <img id="preview-img">
        <div id="preview-warn">This doesn't look like pixel art.</div>
    </div>

    <script>
        const MESHING_CODE = `
import numpy as np
CLOCKWISE, ANTICLOCKWISE = 1, 2
def edge_finding(grid, color):
    mask = np.where(grid == color)
    pos_h = np.zeros((grid.shape[0] + 1, grid.shape[1]), dtype=np.uint8); pos_h[mask] = 1
    hor_edges = (pos_h - np.roll(1 - pos_h, 1, axis=0) == 0) * ANTICLOCKWISE - (pos_h + np.roll(1 - pos_h, 1, axis=0) == 2)
    pos_v = np.zeros((grid.shape[0], grid.shape[1] + 1), dtype=np.uint8); pos_v[mask] = 1
    ver_edges = (pos_v - np.roll(1 - pos_v, 1, axis=1) == 0) * CLOCKWISE + (pos_v + np.roll(1 - pos_v, 1, axis=1) == 2)
    return ver_edges, hor_edges
def explore_up(x, y, v, h):
    for dX in range(x, -1, -1):
        if v[dX, y] == ANTICLOCKWISE: v[dX, y] = 0
        else: break
    else: dX -= 1
    p = f"v{dX - x}"
    if h[dX + 1, y] == CLOCKWISE: return p + explore_right(dX + 1, y, v, h)
    elif y > 0 and h[dX + 1, y - 1] == ANTICLOCKWISE: return p + explore_left(dX + 1, y - 1, v, h)
    return p
def explore_left(x, y, v, h):
    for dY in range(y, -1, -1):
        if h[x, dY] == ANTICLOCKWISE: h[x, dY] = 0
        else: break
    else: dY -= 1
    p = f"h{dY - y}"
    if x > 0 and v[x - 1, dY + 1] == ANTICLOCKWISE: return p + explore_up(x - 1, dY + 1, v, h)
    elif dY < v.shape[1] and v[x, dY + 1] == CLOCKWISE: return p + explore_down(x, dY + 1, v, h)
    return p
def explore_down(x, y, v, h):
    for dX in range(x, v.shape[0]):
        if v[dX, y] == CLOCKWISE: v[dX, y] = 0
        else: break
    else: dX += 1
    p = f"v{dX - x}"
    if y > 0 and h[dX, y - 1] == ANTICLOCKWISE: return p + explore_left(dX, y - 1, v, h)
    elif dX < h.shape[0] and h[dX, y] == CLOCKWISE: return p + explore_right(dX, y, v, h)
    return p
def explore_right(x, y, v, h):
    for dY in range(y, h.shape[1]):
        if h[x, dY] == CLOCKWISE: h[x, dY] = 0
        else: break
    else: dY += 1
    p = f"h{dY - y}"
    if dY < v.shape[1] and v[x, dY] == CLOCKWISE: return p + explore_down(x, dY, v, h)
    elif x > 0 and v[x - 1, dY] == ANTICLOCKWISE: return p + explore_up(x - 1, dY, v, h)
    return p
def path_finding(grid, color):
    v, h = edge_finding(grid, color); path = ""
    while np.any(h == CLOCKWISE):
        x, y = np.argwhere(h == CLOCKWISE)[0]
        path += f"M{y},{x}" + explore_right(x, y, v, h) + "z"
    return path
`;

        let pyodide;
        let selectedFiles = [];
        let twInterval, twEraseInterval, twTimeout;
        let twText = "", twIndex = 0;

        async function init() {
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage("numpy");
                await pyodide.runPython(MESHING_CODE);
                document.getElementById('loading-screen').style.display = 'none';
            } catch(e) { document.getElementById('init-status').innerText = "ERROR LOADING ENGINE"; }
        }
        init();

        function setStatus(text) {
            clearInterval(twInterval); clearInterval(twEraseInterval); clearTimeout(twTimeout);
            twText = text; twIndex = 0; document.getElementById('status').innerText = "";
            
            twInterval = setInterval(() => {
                if(twIndex < twText.length) {
                    twIndex++; document.getElementById('status').innerText = twText.substring(0, twIndex);
                } else {
                    clearInterval(twInterval);
                    twTimeout = setTimeout(startErasing, 5000);
                }
            }, 40);
        }

        function startErasing() {
            clearInterval(twInterval); clearInterval(twEraseInterval);
            twEraseInterval = setInterval(() => {
                if(twIndex > 0) {
                    twIndex--; document.getElementById('status').innerText = twText.substring(0, twIndex);
                } else {
                    clearInterval(twEraseInterval); document.getElementById('status').innerText = "";
                }
            }, 30);
        }

        function transientProc() {
            document.getElementById('proc-indicator').style.opacity = "1";
            setTimeout(() => document.getElementById('proc-indicator').style.opacity = "0", 800);
        }

        function handleFiles(files) {
            transientProc();
            Array.from(files).forEach(f => {
                if(!f.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => { selectedFiles.push({file: f, img}); renderQueue(); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(f);
            });
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            list.innerHTML = "";
            document.getElementById('queue-count').innerText = `(${selectedFiles.length})`;
            
            if(selectedFiles.length > 0) document.body.classList.add('has-files');
            else document.body.classList.remove('has-files');

            const mode = document.querySelector('input[name="mode"]:checked').value;
            let totalPixels = 0;

            selectedFiles.forEach((item, idx) => {
                const isLarge = (item.img.width > 512 || item.img.height > 512);
                totalPixels += (item.img.width * item.img.height);
                
                const div = document.createElement('div'); div.className = 'q-item';
                const color = (isLarge && mode !== 'webp') ? 'var(--warning)' : '#e6e6e6';
                
                div.innerHTML = `<span class="q-name" style="color:${color}">${item.file.name}</span><button class="q-remove" onclick="removeFile(${idx})">×</button>`;
                
                const name = div.querySelector('.q-name');
                name.onmouseenter = (e) => showTooltip(item.img.src, isLarge && mode !== 'webp', e);
                name.onmouseleave = hideTooltip;
                list.appendChild(div);
            });

            if (mode === 'lego') {
                document.getElementById('lego-warn-label').style.display = 'block';
                const statLbl = document.getElementById('stats-label');
                statLbl.innerText = `Lego Mode: ~${totalPixels.toLocaleString()} shapes`;
                statLbl.style.color = totalPixels > 50000 ? 'var(--warning)' : '#666';
            } else {
                document.getElementById('lego-warn-label').style.display = 'none';
                document.getElementById('stats-label').innerText = '';
            }
        }

        function removeFile(i) { selectedFiles.splice(i, 1); renderQueue(); }
        
        function showTooltip(src, showWarn, e) { 
            const t = document.getElementById('preview-tooltip');
            document.getElementById('preview-img').src = src;
            document.getElementById('preview-warn').style.display = showWarn ? 'block' : 'none';
            t.style.display = 'flex';
            
            let tx = e.clientX + 20; let ty = e.clientY - 100;
            if (tx + 180 > window.innerWidth) tx = window.innerWidth - 190;
            if (ty < 10) ty = 10;
            t.style.left = tx + 'px'; t.style.top = ty + 'px';
        }
        
        function hideTooltip() { document.getElementById('preview-tooltip').style.display = 'none'; }
        function toggleLegoOverlay(show) { document.getElementById('lego-overlay').classList.toggle('show', show); }

        document.getElementById('file-input').onchange = e => handleFiles(e.target.files);
        document.getElementById('btn-clear').onclick = () => { selectedFiles = []; renderQueue(); };
        document.getElementById('lego-warn-label').onclick = () => toggleLegoOverlay(true);
        document.getElementById('lego-overlay').onclick = () => toggleLegoOverlay(false);
        document.querySelectorAll('input[name="mode"]').forEach(r => r.onchange = renderQueue);

        const overlay = document.getElementById('drag-overlay');
        window.addEventListener('dragover', (e) => { e.preventDefault(); overlay.style.display = "flex"; });
        window.addEventListener('dragenter', (e) => { e.preventDefault(); });
        window.addEventListener('dragleave', (e) => { if (e.relatedTarget === null || e.fromElement === null) overlay.style.display = "none"; });
        window.addEventListener('drop', (e) => {
            e.preventDefault(); overlay.style.display = "none";
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });

        document.getElementById('btn-convert').onclick = async () => {
            if (selectedFiles.length === 0) return;
            const mode = document.querySelector('input[name="mode"]:checked').value;
            document.getElementById('proc-indicator').style.opacity = "1";
            document.getElementById('btn-convert').disabled = true;
            setStatus("Processing...");

            for(let i=0; i<selectedFiles.length; i++) {
                const item = selectedFiles[i];
                setStatus(`Processing ${i+1}/${selectedFiles.length}...`);
                const {file, img} = item;
                const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, img.width, img.height);
                
                let content, ext = ".svg";
                if(mode === 'monolith') {
                    pyodide.globals.set("raw", imageData.data); pyodide.globals.set("w", img.width); pyodide.globals.set("h", img.height);
                    content = await pyodide.runPythonAsync(`
pixels = np.frombuffer(raw.to_py(), dtype=np.uint8).reshape((h, w, 4))
colors = np.unique(pixels.reshape(-1, 4), axis=0); colors = colors[colors[:, 3] > 0]
grid = (pixels[:,:,0].astype(np.uint32) << 24) | (pixels[:,:,1].astype(np.uint32) << 16) | (pixels[:,:,2].astype(np.uint32) << 8) | pixels[:,:,3]
res = [f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {w} {h}" shape-rendering="crispEdges">', "<style>"]
for i, c in enumerate(colors): res.append(f'.c{i} {{ fill:#{c[0]:02x}{c[1]:02x}{c[2]:02x}; fill-opacity:{c[3]/255}; }}')
res.append("</style>")
for i, c in enumerate(colors):
    c_int = int((c[0]<<24)|(c[1]<<16)|(c[2]<<8)|c[3])
    p_data = path_finding(grid, c_int)
    if p_data: res.append(f'<path class="c{i}" d="{p_data}"/>')
res.append("</svg>")
"\\n".join(res)`);
                } else if(mode === 'lego') {
                    content = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${img.width} ${img.height}" shape-rendering="crispEdges">`;
                    const d = imageData.data;
                    for(let j=0; j<d.length; j+=4) if(d[j+3]>0) {
                        const x=(j/4)%img.width, y=Math.floor((j/4)/img.width);
                        content += `<rect x="${x}" y="${y}" width="1" height="1" fill="#${((1<<24)+(d[j]<<16)+(d[j+1]<<8)+d[j+2]).toString(16).slice(1)}" fill-opacity="${d[j+3]/255}"/>`;
                    }
                    content += `</svg>`;
                } else { content = canvas.toDataURL('image/webp'); ext = ".webp"; }

                const a = document.createElement('a'); a.href = ext === ".svg" ? URL.createObjectURL(new Blob([content], {type:'image/svg+xml'})) : content;
                a.download = file.name.split('.')[0] + ext; a.click();
                await new Promise(r => setTimeout(r, 100));
            }
            document.getElementById('proc-indicator').style.opacity = "0";
            document.getElementById('btn-convert').disabled = false;
            setStatus("Done!");
            selectedFiles = []; renderQueue();
        };
    </script>
</body>
</html>
